<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>OFMS</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background: #111827;
        color: #e5e7eb;
        text-align: center;
        padding: 2rem;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .card {
        max-width: 20rem;
      }
      .logo {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: #22c55e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin: 0 auto 1rem;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.875rem;
        opacity: 0.8;
        line-height: 1.5;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #22c55e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 1.5rem auto 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">🌱</div>
      <h1>Organic Farm Management</h1>
      <p>Connecting to server…</p>
      <div class="spinner" role="status" aria-label="Loading"></div>
      <p style="margin-top: 1.5rem; font-size: 0.75rem; opacity: 0.6">
        If this screen persists, set <code>CAPACITOR_SERVER_URL</code> and run
        <code>npm run mobile:sync</code>.
      </p>
    </div>
  </body>
</html>
