<svg width="720" height="200" viewBox="0 0 720 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#191919"/>
      <stop offset="1" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="glow" x1="360" y1="0" x2="360" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="720" height="200" rx="16" fill="url(#bg)"/>
  <rect width="720" height="200" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="719" height="199" rx="15.5" stroke="#3d3d3d"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#525252">
    <path d="M0 50H720M0 100H720M0 150H720"/>
    <path d="M120 0V200M240 0V200M360 0V200M480 0V200M600 0V200"/>
  </g>

  <!-- Icon -->
  <g transform="translate(48, 52)">
    <circle cx="48" cy="48" r="44" fill="#232323" stroke="#34d399" stroke-width="2.5"/>
    <g transform="translate(24, 22)">
      <path d="M24 38 Q24 30 24 24" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
      <circle cx="24" cy="24" r="3" fill="#34d399"/>
      <ellipse cx="20" cy="21" rx="3" ry="1.5" fill="#6ee7b7"/>
      <ellipse cx="28" cy="21" rx="3" ry="1.5" fill="#10b981"/>
      <path d="M12 42 Q12 34 12 28" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="12" cy="28" r="2.5" fill="#34d399"/>
      <ellipse cx="9" cy="26" rx="2.5" ry="1.2" fill="#6ee7b7"/>
      <ellipse cx="15" cy="26" rx="2.5" ry="1.2" fill="#10b981"/>
      <path d="M36 42 Q36 35 36 29" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="36" cy="29" r="2.5" fill="#34d399"/>
      <ellipse cx="33" cy="27" rx="2.5" ry="1.2" fill="#6ee7b7"/>
      <ellipse cx="39" cy="27" rx="2.5" ry="1.2" fill="#10b981"/>
      <rect x="0" y="40" width="48" height="6" rx="3" fill="#a0522d"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="168" y="88" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ebebeb" letter-spacing="-1">OFMS</text>
  <text x="168" y="118" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#a3a3a3">Organic Farm Management System</text>
  <rect x="168" y="132" width="120" height="3" rx="1.5" fill="url(#accent)"/>
  <rect x="296" y="133.5" width="48" height="1.5" rx="0.75" fill="#6ee7b7" opacity="0.8"/>

  <!-- Tagline chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">
    <rect x="168" y="152" width="108" height="24" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)"/>
    <text x="222" y="168" text-anchor="middle" fill="#6ee7b7">Traceability</text>
    <rect x="284" y="152" width="88" height="24" rx="12" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.3)"/>
    <text x="328" y="168" text-anchor="middle" fill="#93c5fd">Farm Agent</text>
    <rect x="380" y="152" width="72" height="24" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)"/>
    <text x="416" y="168" text-anchor="middle" fill="#6ee7b7">Mobile</text>
  </g>

  <!-- Right: mini pipeline -->
  <g transform="translate(500, 78)" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#737373">
    <circle cx="0" cy="0" r="5" fill="#34d399"/>
    <text x="14" y="4" fill="#a3a3a3">Seed</text>
    <path d="M52 0H88" stroke="#3d3d3d" stroke-width="2"/>
    <circle cx="96" cy="0" r="5" fill="#60a5fa"/>
    <text x="110" y="4" fill="#a3a3a3">Grow</text>
    <path d="M148 0H184" stroke="#3d3d3d" stroke-width="2"/>
    <circle cx="192" cy="0" r="5" fill="#34d399"/>
    <text x="206" y="4" fill="#a3a3a3">Ship</text>

    <circle cx="0" cy="36" r="5" fill="#fbbf24"/>
    <text x="14" y="40" fill="#a3a3a3">Score</text>
    <path d="M52 36H88" stroke="#3d3d3d" stroke-width="2"/>
    <circle cx="96" cy="36" r="5" fill="#34d399"/>
    <text x="110" y="40" fill="#a3a3a3">Alert</text>
    <path d="M148 36H184" stroke="#3d3d3d" stroke-width="2"/>
    <circle cx="192" cy="36" r="5" fill="#a78bfa"/>
    <text x="206" y="40" fill="#a3a3a3">Audit</text>
  </g>

  <!-- Glow accent -->
  <circle cx="620" cy="40" r="56" fill="#34d399" opacity="0.06" filter="url(#soft)"/>
</svg>
